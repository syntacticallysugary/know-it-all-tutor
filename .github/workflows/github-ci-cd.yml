name: GitHub CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  NODE_VERSION: '22'
  PYTHON_VERSION: '3.12'

jobs:
  security-scans:
    name: Security Scans
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install security tools
        run: |
          pip install bandit checkov pip-audit

      - name: Install trufflehog Go binary
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh \
            | sh -s -- -b "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Create security reports directory
        run: mkdir -p security-reports

      - name: Run Bandit SAST
        run: |
          bandit -r src/ infrastructure/ scripts/ \
            -f json -o security-reports/bandit-report.json \
            --severity-level medium --confidence-level medium || true
        continue-on-error: true

      - name: Run Checkov Infrastructure Scan
        run: |
          checkov -d infrastructure/ \
            --output json --output-file-path security-reports || true
        continue-on-error: true

      - name: Run TruffleHog Secrets Scan
        run: |
          trufflehog filesystem . \
            --json --no-update > security-reports/trufflehog-report.json || true
        continue-on-error: true

      - name: Run pip-audit Dependency Scan
        run: |
          pip-audit --format json \
            --output security-reports/pip-audit-report.json \
            --desc --progress-spinner off || true
        continue-on-error: true

      - name: Show Security Reports
        run: |
          echo "=== Bandit SAST Report ==="
          head -50 security-reports/bandit-report.json || echo "No Bandit report"
          echo ""
          echo "=== Checkov Infrastructure Scan ==="
          head -50 security-reports/results_json.json || echo "No Checkov report"
          echo ""
          echo "=== TruffleHog Secrets Scan ==="
          head -50 security-reports/trufflehog-report.json || echo "No TruffleHog report"
          echo ""
          echo "=== pip-audit Dependency Scan ==="
          head -50 security-reports/pip-audit-report.json || echo "No pip-audit report"
        continue-on-error: true

      - name: Upload Security Reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: security-reports/
          retention-days: 30

  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: tutor_system_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-xdist

      - name: Run database migrations
        run: |
          export DATABASE_URL="postgresql://testuser:testpassword@localhost:5432/tutor_system_test"
          psql "$DATABASE_URL" -f src/lambda_functions/migration_runner/migrations/000_create_migrations_table.sql
          psql "$DATABASE_URL" -f src/lambda_functions/migration_runner/migrations/001_dsql_full_schema.sql

      - name: Run backend tests
        env:
          AWS_DEFAULT_REGION: us-east-1
          AWS_ACCESS_KEY_ID: mock-key-id
          AWS_SECRET_ACCESS_KEY: mock-secret-key
        run: |
          export DATABASE_URL="postgresql://testuser:testpassword@localhost:5432/tutor_system_test"
          export PYTHONPATH="${PYTHONPATH}:$(pwd)/src"
          pytest tests/ -v --cov=src --cov-report=term-missing \
            --ignore=tests/integration \
            --ignore=tests/test_localstack_integration.py \
            --ignore=tests/test_secrets_integration.py \
            --ignore=tests/test_domain_unit.py \
            --ignore=tests/test_quiz_unit.py \
            --ignore=tests/test_auth_properties.py \
            --ignore=tests/test_auth_security.py \
            --ignore=tests/test_security_controls.py \
            --ignore=tests/test_progress_properties.py \
            --ignore=tests/test_database_schema_properties.py \
            --ignore=tests/test_deployment_validation.py \
            --ignore=tests/test_batch_upload_unit.py \
            --ignore=tests/test_cognito_auth_properties.py \
            --ignore=tests/test_cognito_integration.py \
            --ignore=tests/test_domain_properties.py \
            --ignore=tests/test_progress_unit.py \
            --ignore=tests/property_tests/test_quiz_properties.py \
            --ignore=tests/test_quiz_properties.py \
            --ignore=tests/test_config_unit.py \
            --ignore=tests/test_security_middleware_unit.py \
            --ignore=tests/test_security_monitoring.py \
            --ignore=tests/test_auth_unit.py \
            --ignore=tests/test_batch_upload_properties.py \
            --ignore=tests/test_answer_evaluation_properties.py \
            --ignore=tests/test_answer_evaluation_unit.py \
            -m "not integration"

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build frontend
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_COGNITO_USER_POOL_ID: ${{ secrets.VITE_COGNITO_USER_POOL_ID }}
          VITE_COGNITO_USER_POOL_CLIENT_ID: ${{ secrets.VITE_COGNITO_USER_POOL_CLIENT_ID }}
          VITE_AWS_REGION: ${{ env.AWS_REGION }}
        run: |
          cd frontend
          npm ci
          npm run build

  deploy:
    name: Deploy to AWS
    runs-on: ubuntu-latest
    needs: [test-backend, build-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install CDK CLI
        run: npm install -g aws-cdk

      - name: Install CDK Python dependencies
        run: |
          cd infrastructure
          pip install -r requirements.txt

      - name: Build frontend for CDK asset
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_COGNITO_USER_POOL_ID: ${{ secrets.VITE_COGNITO_USER_POOL_ID }}
          VITE_COGNITO_USER_POOL_CLIENT_ID: ${{ secrets.VITE_COGNITO_USER_POOL_CLIENT_ID }}
          VITE_AWS_REGION: ${{ env.AWS_REGION }}
        run: |
          cd frontend
          npm ci
          npm run build

      - name: CDK synth dry-run
        run: |
          cd infrastructure
          cdk synth --app "python app_multistack.py" --all

      - name: Deploy all stacks
        run: |
          cd infrastructure
          # Deploy AuthStack and BackendStack first: the new BackendStack template has
          # no Fn::ImportValue on DatabaseStack (endpoint is read from SSM at Lambda
          # runtime instead), so deploying it unblocks DatabaseStack. BackendStack's
          # new template also drops the VPC/subnet/SG imports from NetworkStack.
          # --exclusively prevents CDK from auto-pulling transitive dependencies.
          cdk deploy AuthStack-dev \
            --app "python app_multistack.py" --require-approval never --exclusively
          cdk deploy BackendStack-dev \
            --app "python app_multistack.py" --require-approval never --exclusively
          # DatabaseStack is now unblocked — no deployed stack imports its legacy
          # RDS exports. This creates/updates the DSQL cluster and writes the real
          # endpoint to SSM (/tutor-system/dev/dsql-endpoint).
          cdk deploy DatabaseStack-dev \
            --app "python app_multistack.py" --require-approval never --exclusively
          # FrontendStack and MonitoringStack depend only on BackendStack (already up).
          cdk deploy FrontendStack-dev MonitoringStack-dev \
            --app "python app_multistack.py" --require-approval never --exclusively
          # NetworkStack last — BackendStack no longer imports its VPC/subnet/SG exports.
          cdk deploy NetworkStack-dev --app "python app_multistack.py" --require-approval never

      - name: Run database migrations
        run: |
          aws lambda invoke --function-name BackendStack-dev-MigrationRunnerFunction2F9B9A8B-4WhuBkExC6sf /tmp/migration-output.json
          cat /tmp/migration-output.json

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id E3ADRG3XV0OZSB \
            --paths "/*"

      - name: Ensure ECR lifecycle policy
        run: |
          aws ecr put-lifecycle-policy \
            --repository-name cdk-hnb659fds-container-assets-257949588978-us-east-1 \
            --lifecycle-policy-text '{"rules":[{"rulePriority":1,"selection":{"tagStatus":"any","countType":"imageCountMoreThan","countNumber":2},"action":{"type":"expire"}}]}'

  notify:
    name: Notify Results
    runs-on: ubuntu-latest
    needs: [security-scans, test-backend, build-frontend, deploy]
    if: always()
    steps:
      - name: Check results
        run: |
          echo "Security Scans: ${{ needs.security-scans.result }}"
          echo "Backend Tests:  ${{ needs.test-backend.result }}"
          echo "Frontend Build: ${{ needs.build-frontend.result }}"
          echo "Deploy:         ${{ needs.deploy.result }}"
